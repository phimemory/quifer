<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');
    </style>
  </defs>

  <rect width="500" height="500" fill="#FFFFFF"/>

  <!--
    Syne 800 at 96px:
      cap-height  ~67px above baseline
      descender   ~20px below baseline
      total block ~87px

    To center visually in 500px canvas:
      visual mid  = baseline - (67/2) + (20/2) ≈ baseline - 23.5
      set visual mid = 250  →  baseline = 273.5 ≈ 274

    Rules sit flush to cap-top and descender with 28px breathing room each:
      top rule  = 274 - 67 - 28 = 179
      bot rule  = 274 + 20 + 28 = 322
  -->
  <line x1="60" y1="179" x2="440" y2="179" stroke="#000000" stroke-width="0.8"/>
  <line x1="60" y1="322" x2="440" y2="322" stroke="#000000" stroke-width="0.8"/>

  <text
    x="110" y="274"
    font-family="'Syne', 'Arial Black', Arial, sans-serif"
    font-size="96"
    font-weight="800"
    fill="#000000"
    text-anchor="start"
    letter-spacing="-2"
  >quifer</text>

</svg>
