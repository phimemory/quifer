<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#080A11"/>
    <stop offset="100%" stop-color="#0A0D18"/>
  </linearGradient>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
    <circle cx="18" cy="18" r="0.6" fill="#10142A"/>
  </pattern>
  <linearGradient id="rfade" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0A0D18" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0A0D18" stop-opacity="0.55"/>
  </linearGradient>
</defs>

<!-- background -->
<rect width="1280" height="480" fill="url(#bg)"/>
<rect width="1280" height="480" fill="url(#dots)"/>

<!-- left section divider -->
<line x1="320" y1="50" x2="320" y2="430" stroke="#16192C" stroke-width="1"/>

<!-- ============================================ -->
<!-- LOGO MARK — center (175,240) r=100           -->
<!-- N0(175,140) N1(262,190) N2(262,290)          -->
<!-- N3(175,340) N4(88,290)  N5(88,190)           -->
<!-- ============================================ -->

<polygon points="175,140 262,190 262,290 175,340 88,290 88,190"
  fill="none" stroke="#191D32" stroke-width="1.5" stroke-linejoin="round"/>

<polygon points="175,140 262,190 88,190" fill="#00D9B5" opacity="0.05"/>

<line x1="175" y1="140" x2="262" y2="190" stroke="#00D9B5" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
<line x1="175" y1="140" x2="88"  y2="190" stroke="#00D9B5" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
<line x1="262" y1="190" x2="88"  y2="190" stroke="#00D9B5" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

<circle cx="262" cy="290" r="7" fill="#111525" stroke="#1D2140" stroke-width="1.5"/>
<circle cx="175" cy="340" r="7" fill="#111525" stroke="#1D2140" stroke-width="1.5"/>
<circle cx="88"  cy="290" r="7" fill="#111525" stroke="#1D2140" stroke-width="1.5"/>

<circle cx="175" cy="140" r="21" fill="#00D9B5" opacity="0.07"/>
<circle cx="262" cy="190" r="15" fill="#00D9B5" opacity="0.08"/>
<circle cx="88"  cy="190" r="15" fill="#00D9B5" opacity="0.08"/>

<circle cx="175" cy="140" r="9"   fill="#00D9B5" filter="url(#glow)"/>
<circle cx="262" cy="190" r="7.5" fill="#00D9B5" filter="url(#glow)"/>
<circle cx="88"  cy="190" r="7.5" fill="#00D9B5" filter="url(#glow)"/>

<!-- ============================================ -->
<!-- TEXT SECTION                                 -->
<!-- ============================================ -->

<!-- project name -->
<text x="360" y="222"
  font-family="'Inter','SF Pro Display','Segoe UI','Helvetica Neue',sans-serif"
  font-size="80" font-weight="700" fill="#EDF0FC" letter-spacing="-1">quifer</text>

<!-- teal accent -->
<rect x="360" y="240" width="58" height="3" rx="1.5" fill="#00D9B5"/>

<!-- tagline -->
<text x="360" y="283"
  font-family="'Inter','SF Pro Display','Segoe UI','Helvetica Neue',sans-serif"
  font-size="17.5" font-weight="400" fill="#47506E">Finds Sybil farms by fingerprinting the order of every</text>
<text x="360" y="308"
  font-family="'Inter','SF Pro Display','Segoe UI','Helvetica Neue',sans-serif"
  font-size="17.5" font-weight="400" fill="#47506E">transaction a wallet ever made.</text>

<!-- pills -->
<rect x="360" y="350" width="144" height="27" rx="13.5" fill="#0C1020" stroke="#1C2244" stroke-width="1"/>
<text x="432" y="368.5"
  font-family="'Inter','SF Pro Display','Segoe UI',sans-serif"
  font-size="10.5" font-weight="500" fill="#00D9B5"
  text-anchor="middle" letter-spacing="2">PHASE MEMORY</text>

<rect x="516" y="350" width="100" height="27" rx="13.5" fill="#0C1020" stroke="#1C2244" stroke-width="1"/>
<text x="566" y="368.5"
  font-family="'Inter','SF Pro Display','Segoe UI',sans-serif"
  font-size="10.5" font-weight="500" fill="#00D9B5"
  text-anchor="middle" letter-spacing="2">3 SIGNALS</text>

<rect x="628" y="350" width="106" height="27" rx="13.5" fill="#0C1020" stroke="#1C2244" stroke-width="1"/>
<text x="681" y="368.5"
  font-family="'Inter','SF Pro Display','Segoe UI',sans-serif"
  font-size="10.5" font-weight="500" fill="#00D9B5"
  text-anchor="middle" letter-spacing="2">ON-CHAIN</text>

