<!-- ============================================ -->

<!-- scattered bg wallet dots -->
<circle cx="875" cy="95"  r="2.5" fill="#181D33"/>
<circle cx="920" cy="158" r="2"   fill="#141830"/>
<circle cx="885" cy="245" r="2.5" fill="#181D33"/>
<circle cx="858" cy="335" r="2"   fill="#141830"/>
<circle cx="908" cy="415" r="2.5" fill="#181D33"/>
<circle cx="962" cy="72"  r="2"   fill="#141830"/>
<circle cx="998" cy="212" r="2.5" fill="#181D33"/>
<circle cx="972" cy="295" r="2"   fill="#141830"/>
<circle cx="958" cy="382" r="2.5" fill="#181D33"/>
<circle cx="1048" cy="125" r="2"  fill="#141830"/>
<circle cx="1072" cy="268" r="2.5" fill="#181D33"/>
<circle cx="1042" cy="392" r="2"  fill="#141830"/>
<circle cx="1118" cy="78"  r="2.5" fill="#181D33"/>
<circle cx="1152" cy="202" r="2"  fill="#141830"/>
<circle cx="1128" cy="368" r="2.5" fill="#181D33"/>
<circle cx="1198" cy="128" r="2"  fill="#141830"/>
<circle cx="1228" cy="288" r="2.5" fill="#181D33"/>
<circle cx="1258" cy="168" r="2"  fill="#141830"/>
<circle cx="1248" cy="392" r="2.5" fill="#181D33"/>
<circle cx="1080" cy="430" r="2"  fill="#141830"/>

<!-- cluster A: 4-node ring (brighter) -->
<line x1="948"  y1="168" x2="1004" y2="126" stroke="#00D9B5" stroke-width="1.2" opacity="0.55"/>
<line x1="1004" y1="126" x2="1062" y2="158" stroke="#00D9B5" stroke-width="1.2" opacity="0.55"/>
<line x1="1062" y1="158" x2="1028" y2="208" stroke="#00D9B5" stroke-width="1.2" opacity="0.55"/>
<line x1="1028" y1="208" x2="948"  y2="168" stroke="#00D9B5" stroke-width="1.2" opacity="0.55"/>

<circle cx="948"  cy="168" r="5.5" fill="#00D9B5" opacity="0.8" filter="url(#glow)"/>
<circle cx="1004" cy="126" r="5.5" fill="#00D9B5" opacity="0.8" filter="url(#glow)"/>
<circle cx="1062" cy="158" r="5.5" fill="#00D9B5" opacity="0.8" filter="url(#glow)"/>
<circle cx="1028" cy="208" r="5"   fill="#00D9B5" opacity="0.8" filter="url(#glow)"/>

<!-- cluster B: 3-node triangle (dimmer) -->
<line x1="1138" y1="298" x2="1192" y2="262" stroke="#00D9B5" stroke-width="1" opacity="0.35"/>
<line x1="1192" y1="262" x2="1242" y2="298" stroke="#00D9B5" stroke-width="1" opacity="0.35"/>
<line x1="1192" y1="262" x2="1188" y2="335" stroke="#00D9B5" stroke-width="1" opacity="0.35"/>

<circle cx="1138" cy="298" r="4.5" fill="#00D9B5" opacity="0.5" filter="url(#glow)"/>
<circle cx="1192" cy="262" r="5"   fill="#00D9B5" opacity="0.5" filter="url(#glow)"/>
<circle cx="1242" cy="298" r="4.5" fill="#00D9B5" opacity="0.5" filter="url(#glow)"/>
<circle cx="1188" cy="335" r="4"   fill="#00D9B5" opacity="0.5" filter="url(#glow)"/>

<!-- right edge fade -->
<rect x="1095" y="0" width="185" height="480" fill="url(#rfade)"/>

<!-- credit -->
<text x="1268" y="466"
  font-family="'Inter','SF Pro Display','Segoe UI',sans-serif"
  font-size="10.5" fill="#22284A" text-anchor="end">built on helix</text>

</svg>
