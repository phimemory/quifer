<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;800&amp;family=Space+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <rect width="1500" height="500" fill="#000000"/>

  <!-- Left block: the wordmark -->
  <text
    x="200" y="330"
    font-family="'Syne', 'Arial Black', Arial, sans-serif"
    font-size="200"
    font-weight="800"
    fill="#FFFFFF"
    text-anchor="start"
    letter-spacing="-8"
  >quifer</text>

  <!-- Vertical rule divider -->
  <line x1="950" y1="80" x2="950" y2="420" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>

  <!-- Right block: editorial metadata stack -->
  <text
    x="990" y="240"
    font-family="'Syne', Arial, sans-serif"
    font-size="36"
    font-weight="800"
    fill="#FFFFFF"
    text-anchor="start"
    letter-spacing="-1"
  >Sybil Detection</text>

  <text
    x="990" y="280"
    font-family="'Syne', Arial, sans-serif"
    font-size="36"
    font-weight="400"
    fill="#FFFFFF"
    text-anchor="start"
    letter-spacing="-1"
    opacity="0.5"
  >Intelligence Layer</text>

  <line x1="990" y1="320" x2="1400" y2="320" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>

  <text
    x="990" y="365"
    font-family="'Space Mono', 'Courier New', monospace"
    font-size="12"
    font-weight="400"
    fill="#FFFFFF"
